<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Gentleman's Garage</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="main-nav">
    <div class="nav-links">
      <a href="../index.html">HOME</a>
      <a href="about.html">ABOUT</a>
      <a href="services.html">SERVICES</a>
      <a href="gallery.html">GALLERY</a>
      <a href="contact.html" class="active">CONTACT</a>
    </div>
    <a href="contact.html" class="nav-cta">GET IN TOUCH</a>
  </nav>

  <div class="page-header">
    <h1>CONTACT</h1>
    <p>We'd love to hear from you. Reach out to discuss your project or book an experience.</p>
  </div>

  <div class="page-content">
    <form class="contact-form">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" required>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel">
        </div>
      </div>
      <div class="form-group">
        <label>Subject</label>
        <select>
          <option>General Inquiry</option>
          <option>AI Restoration</option>
          <option>Custom Build</option>
          <option>Wine Tour</option>
          <option>Event Booking</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea placeholder="Tell us about your project or inquiry..."></textarea>
      </div>
      <button type="submit" class="btn btn-outline" style="width:100%">SEND MESSAGE</button>
    </form>
  </div>

  <footer class="main-footer">
    <div class="footer-bottom">
      <p>&copy; 2026 Gentleman's Garage. All rights reserved.</p>
    </div>
  </footer>
  <script src="../js/main.js"></script>
</body>
</html>
